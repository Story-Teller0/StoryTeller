<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Teller - My Twine Games</title>
    <style>
        /* CSS VARIABLES */
        :root {
            --bg-dark: #0d0d12;
            --bg-card: rgba(26, 26, 36, 0.6);
            --purple: #8A2BE2;
            --turquoise: #40E0D0;
            --text-light: #e0e0e0;
            --text-muted: #a0a0a0;
        }

        /* GLOBAL STYLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* BACKGROUND ANIMATION (Aurora / Floating Orbs) */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
            will-change: transform;
        }

        .orb-1 {
            width: 50vw; height: 50vw;
            background: var(--purple);
            top: -10%; left: -10%;
        }

        .orb-2 {
            width: 60vw; height: 60vw;
            background: var(--turquoise);
            bottom: -20%; right: -10%;
            animation-delay: -5s;
            animation-duration: 25s;
        }

        .orb-3 {
            width: 40vw; height: 40vw;
            background: #2a1b54;
            top: 30%; left: 30%;
            animation-delay: -10s;
            animation-duration: 30s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10vw, 15vh) scale(1.1); }
            100% { transform: translate(-10vw, 10vh) scale(0.9); }
        }

        /* HEADER & TITLE */
        header {
            text-align: center;
            padding: 50px 20px 20px;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .anim-story {
            background: linear-gradient(90deg, var(--turquoise), var(--purple), var(--turquoise));
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            display: inline-block;
            text-shadow: 0px 0px 20px rgba(138, 43, 226, 0.4);
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .teller {
            color: var(--text-light);
        }

        /* MAIN LAYOUT */
        main {
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 40px;
            color: var(--turquoise);
            border-bottom: 2px solid var(--purple);
            display: inline-block;
            padding-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .title-container {
            text-align: center;
        }

        /* GRID SYSTEM: 2 COLUMNS (2x2 layout for 4 items) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px; 
        }

        @media (max-width: 768px) {
            .grid-container { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
            .card { height: 400px; }
        }

        .card {
            background-color: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 500px; 
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(64, 224, 208, 0.4);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        /* Black Transparent Gradient Banner */
        .card-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.5) 60%, rgba(0, 0, 0, 0) 100%);
            color: #fff;
            padding: 60px 20px 20px 20px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .card:hover .card-banner {
            transform: translateY(100%);
            opacity: 0;
        }

        /* --- DISABLED CARD STYLES --- */
        .card.disabled-card {
            cursor: not-allowed;
            filter: grayscale(70%) opacity(0.6); /* Makes the card look dim/inactive */
        }

        /* Remove card float & shadow change on hover */
        .card.disabled-card:hover {
            transform: translateY(0);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6); 
        }

        /* Prevent image from zooming on hover */
        .card.disabled-card:hover img {
            transform: scale(1);
        }

        /* Prevent banner from disappearing on hover */
        .card.disabled-card:hover .card-banner {
            transform: translateY(0);
            opacity: 1;
        }
        /* --------------------------- */

        /* GAME SUB-SITE SECTION */
        #game-page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-back {
            background: none;
            border: none;
            color: var(--turquoise);
            font-size: 1.2rem;
            cursor: pointer;
            margin-bottom: 20px;
            transition: color 0.2s, text-shadow 0.2s;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .btn-back:hover {
            color: var(--purple);
            text-shadow: 0 2px 10px rgba(138, 43, 226, 0.8);
        }

        .game-title {
            font-size: 3rem;
            color: var(--text-light);
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }

        /* Game Container */
        .game-wrapper {
            position: relative;
            width: 100%;
            height: 850px;
            background: #000;
            border: 2px solid var(--purple);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* Play Overlay */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(13, 13, 18, 0.7), rgba(13, 13, 18, 0.9)), url('') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .btn-play {
            background-color: var(--turquoise);
            color: var(--bg-dark);
            border: none;
            padding: 20px 50px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 0 20px var(--turquoise);
        }

        .btn-play:hover {
            background-color: var(--purple);
            color: #fff;
            box-shadow: 0 0 30px var(--purple);
            transform: scale(1.05);
        }

        .btn-maximize {
            background-color: rgba(0,0,0,0.5);
            color: var(--text-light);
            border: 1px solid var(--purple);
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
            display: block;
            margin-bottom: 30px;
        }

        .btn-maximize:hover {
            background-color: var(--purple);
        }

        .game-description {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 8px;
            border-left: 5px solid var(--turquoise);
            line-height: 1.8;
            font-size: 1.1rem;
            color: var(--text-light);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* FOOTER & SOCIALS */
        footer {
            background-color: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 30px;
            text-align: center;
            margin-top: 50px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 15px;
            flex-wrap: wrap; /* Allows them to stack neatly on tiny screens */
        }

        .social-icon {
            fill: var(--text-muted);
            color: var(--text-muted);
            width: 35px;
            height: 35px;
            transition: fill 0.3s ease, color 0.3s ease, transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
        }

        .social-icon:hover {
            fill: var(--turquoise);
            color: var(--turquoise);
            transform: translateY(-5px);
            filter: drop-shadow(0 0 10px var(--turquoise));
        }
        
        .game-wrapper:fullscreen { border: none; border-radius: 0; }
    </style>
</head>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // NOTE the "disabled: true" flag on the last three games!
        const gamesData = [
            {
                id: 1,
                title: "First Time",
                desc: "First Time is a choice-driven Twine visual novel where you explore six unique scenarios that each lead to a different romantic and intimate experience. Every route features different characters, situations, tones, and outcomes — putting you in control of how your story unfolds.",
                img: "images/logo.png",
                url: "first_time/index.html" 
            },
            {
                id: 2,
                title: "?",
                desc: "Trapped on a derelict space station, you must piece together what happened to the crew before the life support fails. A thrilling sci-fi horror Twine experience.",
                img: "images/sad_sponge.jpg",
                url: "about:blank",
                disabled: true
            },
            {
                id: 3,
                title: "?",
                desc: "A Gothic murder mystery set in the 1800s. Explore the dark halls of Crimson Manor, interview suspects, and gather clues. Will you solve the mystery, or become the next victim?",
                img: "images/wait.jpg",
                url: "about:blank",
                disabled: true
            },
            {
                id: 4,
                title: "?",
                desc: "Dive into the surreal landscapes of human dreams. As a Dream Walker, you cure nightmares by venturing directly into them. Fantasy, magic, and beautiful imagery await.",
                img: "images/wait1.jpg",
                url: "about:blank",
                disabled: true
            }
        ];

        const homePage = document.getElementById('home-page');
        const gamePage = document.getElementById('game-page');
        const gamesGrid = document.getElementById('games-grid');
        
        const displayTitle = document.getElementById('display-title');
        const displayDesc = document.getElementById('display-desc');
        const gameIframe = document.getElementById('game-iframe');
        const playOverlay = document.getElementById('play-overlay');

        function renderCards() {
            gamesData.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // If game has "disabled: true", don't add click handler and add the disabled CSS class
                if (game.disabled) {
                    card.classList.add('disabled-card');
                    card.innerHTML = `
                        <img src="${game.img}" alt="${game.title}">
                        <div class="card-banner">
                            ${game.title}<br>
                            <span style="font-size: 0.9rem; color: var(--turquoise); opacity: 0.8; font-weight: normal;">(Coming Soon)</span>
                        </div>
                    `;
                } else {
                    card.onclick = () => openGame(game);
                    card.innerHTML = `
                        <img src="${game.img}" alt="${game.title}">
                        <div class="card-banner">${game.title}</div>
                    `;
                }
                
                gamesGrid.appendChild(card);
            });
        }

        function openGame(game) {
            homePage.style.display = 'none';
            gamePage.style.display = 'block';
            window.scrollTo(0, 0);

            displayTitle.innerText = game.title;
            displayDesc.innerText = game.desc;
            
            gameIframe.src = game.url;
            
            playOverlay.style.display = 'flex';
            gameIframe.style.display = 'none';
        }

        function playGame() {
            playOverlay.style.display = 'none';
            gameIframe.style.display = 'block';
        }

        function goBack() {
            gamePage.style.display = 'none';
            homePage.style.display = 'block';
            gameIframe.src = ""; 
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('game-wrapper');
            
            if (!document.fullscreenElement) {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                } else if (wrapper.msRequestFullscreen) {
                    wrapper.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        window.onload = renderCards;
    </script>
